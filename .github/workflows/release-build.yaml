name: Build ledfx and push to docker hub
on:
  push:
    branches:
      - master
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - 'startup.sh'

jobs:
    check-changes:
      name: Check for relevant changes
      runs-on: ubuntu-latest
      outputs:
        should_build: ${{ steps.check.outputs.should_build }}
      steps:
        - uses: actions/checkout@v6
          with:
            fetch-depth: 2

        - name: Check if Dockerfile or requirements.txt changed
          id: check
          run: |
            if git diff --name-only HEAD~1 HEAD | grep -qE '(Dockerfile|requirements.txt|startup.sh)'; then
              echo "should_build=true" >> $GITHUB_OUTPUT
            else
              echo "should_build=false" >> $GITHUB_OUTPUT
            fi
    create-release:
      name: Create GitHub Release
      needs: check-changes
      if: needs.check-changes.outputs.should_build == 'true'
      runs-on: ubuntu-latest
      permissions:
        contents: write
      outputs:
        version: ${{ steps.version.outputs.LEDFX_VERSION }}
      steps:
        - uses: actions/checkout@v6

        - name: Extract ledfx version from requirements.txt
          id: version
          run: echo "LEDFX_VERSION=$(grep 'ledfx==' requirements.txt | cut -d'=' -f3)" >> $GITHUB_OUTPUT

        - name: Create Release
          uses: softprops/action-gh-release@v3
          with:
            tag_name: v${{ steps.version.outputs.LEDFX_VERSION }}
            name: Release v${{ steps.version.outputs.LEDFX_VERSION }}
            generate_release_notes: true
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build:
      name: push docker image to docker hub
      needs: create-release
      if: success()
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v4

        - name: Log in to Docker Hub
          uses: docker/login-action@v4
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Build and push Docker image
          uses: docker/build-push-action@v7
          with:
            context: .
            file: ./Dockerfile
            push: true
            tags: |
              gerulrich/ledfx:${{ needs.create-release.outputs.version }}
              gerulrich/ledfx:latest
            platforms: linux/amd64,linux/arm64